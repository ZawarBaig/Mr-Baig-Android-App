name: Build MrBaigDownloader APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Apply All Fixes (Dependencies + Kotlin API + Logs)
        run: |
          # 1. Update Group ID and Version to the new Maven Central library (Fixes Python 3.10+ issue)
          sed -i 's/com.github.yausername.youtubedl-android/io.github.junkfood02.youtubedl-android/g' app/build.gradle
          sed -i 's/0.17.+/0.18.1/g' app/build.gradle
          
          # 2. Patch Kotlin code to bypass the permanently removed 'removeOption' function
          sed -i 's/addOption("--no-playlist")/\/\/addOption("--no-playlist")/g' app/src/main/java/com/mrbaigsdownloader/utils/DownloadEngine.kt
          sed -i 's/if (isPlaylist) removeOption("--no-playlist")/if (!isPlaylist) addOption("--no-playlist")/g' app/src/main/java/com/mrbaigsdownloader/utils/DownloadEngine.kt
          
          # 3. Unhide the raw error messages for future debugging
          sed -i 's/else -> "Download failed. Please check the URL and try again."/else -> "Raw Error: $raw"/g' app/src/main/java/com/mrbaigsdownloader/utils/DownloadEngine.kt

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"

      - name: Rename and Move APKs
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/*.apk output/

      - name: Upload Split APKs
        uses: actions/upload-artifact@v4.6.2
        with:
          name: MrBaigDownloader-APKs
          path: output/*.apk
          retention-days: 30
